apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "joomla-codex.fullname" . }}
  labels:
    {{- include "joomla-codex.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "joomla-codex.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "joomla-codex.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: joomla
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: JOOMLA_DB_HOST
              value: {{ include "joomla-codex.dbHost" . | quote }}
            - name: JOOMLA_DB_USER
              value: {{ default .Values.joomla.dbUser .Values.global.dbUser | quote }}
            - name: JOOMLA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mysql.fullnameOverride | default (printf "%s-mysql" (include "joomla-codex.fullname" .)) }}-secret
                  key: MYSQL_PASSWORD
            - name: JOOMLA_DB_NAME
              value: {{ default .Values.joomla.dbName .Values.global.dbName | quote }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: joomla-data
              mountPath: {{ .Values.joomla.dataMountPath | quote }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: joomla-data
          persistentVolumeClaim:
            claimName: {{ include "joomla-codex.pvcName" . }}
      {{- end }}
