apiVersion: v1
kind: Pod
metadata:
  name: {{ printf "%s-http-smoke-test" (include "joomla-codex.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "joomla-codex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: http-smoke-test
      image: curlimages/curl:8.11.1
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -ec
        - curl -fsS --retry 6 --retry-delay 5 --connect-timeout 5 "http://{{ include "joomla-codex.fullname" . }}:{{ .Values.service.port }}/" >/dev/null
