apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mysql.fullname" . }}
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mysql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mysql.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: mysql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: MYSQL_DATABASE
              value: {{ default .Values.mysql.database .Values.global.dbName | quote }}
            - name: MYSQL_USER
              value: {{ default .Values.mysql.user .Values.global.dbUser | quote }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mysql.secretName" . }}
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mysql.secretName" . }}
                  key: MYSQL_ROOT_PASSWORD
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: mysql-data
              mountPath: {{ .Values.mysql.dataMountPath | quote }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: {{ include "mysql.pvcName" . }}
      {{- end }}
      {{- /* Render tolerations only when enabled and non-empty. Per-item validation:
           - require key, operator, effect
           - if operator == "Equal" then value is required
           - if operator == "Exists" omit value
         */ -}}
      {{- if and .Values.tolerationsEnabled (gt (len .Values.tolerations) 0) }}
      tolerations:
      {{- range .Values.tolerations }}
      {{- if and .key .operator .effect }}
        {{- if eq .operator "Equal" }}
          {{- if .value }}
      - key: "{{ .key }}"
        operator: "{{ .operator }}"
        value: "{{ .value }}"
        effect: "{{ .effect }}"
          {{- end }}
        {{- else }}
      - key: "{{ .key }}"
        operator: "{{ .operator }}"
        effect: "{{ .effect }}"
        {{- end }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- if and .Values.affinity.enabled .Values.affinity.nodeAffinity }}
      affinity:
        nodeAffinity:
          {{- toYaml .Values.affinity.nodeAffinity | nindent 10 }}
      {{- end }}
