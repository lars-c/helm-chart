## Shared database values used by Joomla and MySQL.
global:
  # JOOMLA_DB_USER / MYSQL_USER
  dbuser: "j210"
  # JOOMLA_DB_NAME / MYSQL_DATABASE
  dbname: "joomla_db"
  # JOOMLA_DB_PASSWORD / MYSQL_PASSWORD
  dbpassword: "change-me"
  # JOOMLA_DB_HOST
  joomlaDbHost: "mysqldb"

## Optional chart name overrides.
nameOverride: ""
fullnameOverride: ""

## Debug values.
debug:
  enable: true
  value: "Test"

## Joomla image configuration.
image:
  repository: joomla
  tag: "5.4.0-php8.3-apache"
  pullPolicy: IfNotPresent

## Joomla Service configuration.
service:
  type: LoadBalancer
  port: 80
  loadBalancerIP: ""

## Joomla persistent storage configuration.
storage:
  class: "local-path"
  accessMode: ReadWriteOnce
  size: 2Gi

## Joomla resource requests and limits.
resources:
  enableLimit: false
  limits:
    cpu: "500m"
    memory: "768Mi"
  enableRequest: true
  requests:
    cpu: "250m"
    memory: "256Mi"

## Joomla pod tolerations.
tolerationsEnabled: true
tolerations:
  - key: "key1"
    operator: "Equal"
    value: "gray"
    effect: "NoSchedule"
  - key: "key1"
    operator: "Equal"
    value: "orange"
    effect: "NoSchedule"

## MySQL sub-chart values managed by the parent chart.
mysql:
  ## Debug values.
  debug:
    enable: false
    value: "TestMySQL"

  ## MySQL image configuration.
  image:
    repository: "mysql"
    tag: "8.0"
    pullPolicy: IfNotPresent

  ## MySQL authentication configuration.
  auth:
    rootdbpassword: "change-me-root"

  ## MySQL timezone.
  timezone: "Europe/Copenhagen"

  ## MySQL persistent storage configuration.
  storage:
    class: "local-path"
    accessMode: ReadWriteOnce
    size: 2Gi

  ## MySQL resource requests and limits.
  resources:
    enableLimit: false
    limits:
      cpu: "500m"
      memory: "768Mi"
    enableRequest: true
    requests:
      cpu: "250m"
      memory: "512Mi"

  ## MySQL pod tolerations.
  tolerationsEnabled: false
  tolerations:
    - key: "key1"
      operator: "Equal"
      value: "gray"
      effect: "NoSchedule"
    - key: "key1"
      operator: "Equal"
      value: "orange"
      effect: "NoSchedule"
