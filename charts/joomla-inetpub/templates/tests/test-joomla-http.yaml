apiVersion: v1
kind: Pod
metadata:
  name: joomla-http-smoke-test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: wget
    image: busybox:1.36
    command:
    - sh
    - -ec
    - wget -q -T 15 -O /dev/null "http://joomla:{{ .Values.service.port }}/"
