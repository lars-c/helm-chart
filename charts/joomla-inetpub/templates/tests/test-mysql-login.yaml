apiVersion: v1
kind: Pod
metadata:
  name: mysql-login-smoke-test
  labels:
    app: joomla
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: mysql-client
    image: {{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag }}
    env:
    - name: MYSQL_HOST
      value: {{ .Values.global.joomlaDbHost | quote }}
    - name: MYSQL_DATABASE
      value: {{ .Values.global.dbname | quote }}
    - name: MYSQL_USER
      value: {{ .Values.global.dbuser | quote }}
    - name: MYSQL_PASSWORD
      valueFrom:
        secretKeyRef:
          name: mysql-secret
          key: dbpassword
    command:
    - sh
    - -ec
    - mysql -h "$MYSQL_HOST" -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DATABASE" -e "SELECT 1;"
