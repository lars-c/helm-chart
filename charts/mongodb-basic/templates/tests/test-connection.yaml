apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mongodb-dok.fullname" . }}-test-connection"
  labels:
    {{- include "mongodb-dok.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: nc
      image: busybox
      command: ['sh', '-c']
      args: ['nc -vz {{ .Values.serviceName }} {{ .Values.mongo.port }}']
  restartPolicy: Never
